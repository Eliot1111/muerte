name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  publish:
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Production build
        env:
          VITE_BASE_URL: /muerte/
        run: npm run build

      - name: Publish build to repository root
        run: npm run publish:pages

      - name: Commit published site
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'chore: publish site build to main [skip ci]'
          file_pattern: |
            index.html
            404.html
            assets/**
            models/**
            dishes/**
            textures/**
            favicon.svg
            robots.txt
            .nojekyll
